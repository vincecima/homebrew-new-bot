[project]
name = "homebrew-new-bot"
version = "0.2.0"
description = ""
authors = [
    { name = "Vince Cima", email = "contact@vincecima.com" }
]
dependencies = [
    "requests>=2.31.0",
    "Mastodon.py>=1.8.1",
]
readme = "README.md"
requires-python = ">= 3.11"

[project.scripts]
new-formula = 'homebrew_new_bot.post_new_formula:main'

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.rye]
managed = true
dev-dependencies = [
    "ruff>=0.1.14",
    "mypy>=1.8.0",
    "types-requests>=2.31.0.20240125",
]

[tool.hatch.metadata]
allow-direct-references = true

[tool.hatch.build.targets.wheel]
packages = ["src/homebrew_new_bot"]
