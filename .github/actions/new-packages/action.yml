---
name: New Packages
description: >-
  Capture the API output, update local state and post new packages to
  destinations
inputs:
  bsky_password:
    description: Password for Bluesky posting account
    required: true
  bsky_username:
    description: Bluesky handle for account
    required: true
  github_token:
    description: GitHub App installation access token
    required: true
  mastodon_access_token:
    description: Client access token for posting
    required: true
  mastodon_api_base_url:
    description: The API endpoint for posting toots
    required: true
  mastodon_client_secret:
    description: Client secret for posting
    required: true
  max_skeets_per_execution:
    description: The number of skeets to output in a single execution
    required: true
  max_toots_per_execution:
    description: The number of toots to output in a single execution
    required: true
  package_type:
    description: The type of package, must have a matching state directory
    required: true
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@v2
      with:
        version: 0.5.0
        enable-cache: true
        github-token: ${{ inputs.GITHUB_TOKEN }}
    - name: Fetch latest formula data
      shell: bash
      env:
        PACKAGE_TYPE: ${{ inputs.package_type }}
      run: uv run homebrew-new-bot api "$PACKAGE_TYPE"
    - name: Update package database
      shell: bash
      env:
        PACKAGE_TYPE: ${{ inputs.package_type }}
      run: |-
        uv run homebrew-new-bot database restore "$PACKAGE_TYPE"
        uv run homebrew-new-bot database update "$PACKAGE_TYPE"
        uv run homebrew-new-bot database dump "$PACKAGE_TYPE"
    - name: Post new formula to mastodon
      shell: bash
      env:
        PACKAGE_TYPE: ${{ inputs.package_type }}
        MASTODON_API_BASE_URL: ${{ inputs.mastodon_api_base_url }}
        MASTODON_ACCESS_TOKEN: ${{ inputs.mastodon_access_token }}
        MASTODON_CLIENT_SECRET: ${{ inputs.mastodon_client_secret }}
        MAX_TOOTS: ${{ inputs.max_toots_per_execution }}
      run: uv run homebrew-new-bot toot --max_toots_per_execution="$MAX_TOOTS" --mastodon_api_base_url="$MASTODON_API_BASE_URL" --mastodon_access_token="$MASTODON_ACCESS_TOKEN" --mastodon_client_secret="$MASTODON_CLIENT_SECRET" "$PACKAGE_TYPE"
    - name: Post new formula to bsky
      shell: bash
      env:
        PACKAGE_TYPE: ${{ inputs.package_type }}
        BSKY_USERNAME: ${{ inputs.bsky_username }}
        BSKY_PASSWORD: ${{ inputs.bsky_password }}
        MAX_SKEETS: ${{ inputs.max_skeets_per_execution }}
      run: uv run homebrew-new-bot skeet --max_skeets_per_execution="$MAX_SKEETS" --bsky_username="$BSKY_USERNAME" --bsky_password="$BSKY_PASSWORD" "$PACKAGE_TYPE"
    - name: Commit and push if it changed
      shell: bash
      if: ${{ always() }}
      run: |-
        git config user.name "Automated"
        git config user.email "actions@users.noreply.github.com"
        git add state/
        timestamp=$(date -u)
        git commit -m "Latest state: ${timestamp}" || exit 0
        git push
